<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon — Odisha Bikes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0a0a0a',
                        secondary: '#ef4444',
                        'secondary-container': '#b91c1c',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg-[#0a0a0a] text-white font-['Space_Grotesk'] min-h-screen flex flex-col">

    <!-- Navbar injected by js/app.js -->
    <div id="main-nav"></div>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center px-6 pt-20">
        <div class="text-center max-w-2xl mx-auto">

            <!-- Icon -->
            <div class="w-24 h-24 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center mx-auto mb-10">
                <span class="material-symbols-outlined text-red-500 text-5xl">compare</span>
            </div>

            <!-- Heading -->
            <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tighter text-zinc-100 mb-4">
                Coming <span class="text-red-500">Soon</span>
            </h1>

            <p class="text-zinc-400 text-lg font-['Manrope'] mb-2">Bike Comparison Tool</p>
            <p class="text-zinc-600 text-sm font-['Manrope'] leading-relaxed mb-12 max-w-md mx-auto">
                We're building a powerful side-by-side comparison engine. Compare specs, prices, and performance across all bikes — launching soon.
            </p>

            <!-- Divider -->
            <div class="w-16 h-px bg-red-600/40 mx-auto mb-12"></div>

            <!-- Back button -->
            <a href="index.html" class="inline-flex items-center gap-2 bg-zinc-900 border border-zinc-800 text-zinc-300 hover:text-white hover:border-red-600 px-8 py-3 rounded-full text-sm font-['Manrope'] uppercase tracking-widest transition-all duration-200">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Home
            </a>
        </div>
    </main>

    <!-- Footer injected by js/app.js -->
    <div id="main-footer"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/app.js"></script>
    <script src="js/firebase.js"></script>
</body>
</html>
