<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | Odisha Bikes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#690005",
                        "secondary-container": "#ad0224",
                        "tertiary-fixed-dim": "#ffb780",
                        "on-primary-fixed-variant": "#454747",
                        "on-surface-variant": "#e4bebc",
                        "surface-container-lowest": "#0e0e0e",
                        "inverse-primary": "#5d5f5f",
                        "tertiary-container": "#ca7f41",
                        "on-error-container": "#ffdad6",
                        "surface-tint": "#c6c6c7",
                        "primary": "#c6c6c7",
                        "tertiary-fixed": "#ffdcc4",
                        "tertiary": "#ffb780",
                        "on-secondary-container": "#ffb8b5",
                        "on-tertiary-fixed": "#2f1400",
                        "secondary": "#ffb3b1",
                        "background": "#131313",
                        "outline-variant": "#5b403f",
                        "on-primary": "#2f3131",
                        "on-tertiary-fixed-variant": "#6f3800",
                        "on-secondary-fixed": "#410007",
                        "on-primary-container": "#282a2a",
                        "primary-fixed-dim": "#c6c6c7",
                        "surface-container-high": "#2a2a2a",
                        "surface-variant": "#353534",
                        "surface": "#131313",
                        "on-tertiary-container": "#442000",
                        "on-tertiary": "#4e2600",
                        "secondary-fixed": "#ffdad8",
                        "on-secondary": "#680011",
                        "on-secondary-fixed-variant": "#92001c",
                        "surface-container": "#201f1f",
                        "error": "#ffb4ab",
                        "secondary-fixed-dim": "#ffb3b1",
                        "surface-bright": "#393939",
                        "on-background": "#e5e2e1",
                        "surface-container-low": "#1c1b1b",
                        "inverse-on-surface": "#313030",
                        "primary-container": "#909191",
                        "outline": "#ab8987",
                        "surface-container-highest": "#353534",
                        "on-primary-fixed": "#1a1c1c",
                        "on-surface": "#e5e2e1",
                        "inverse-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "primary-fixed": "#e2e2e2",
                        "error-container": "#93000a"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <!-- Single stylesheet for all pages -->
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg-surface-dim text-on-surface font-body selection:bg-secondary/30">
    <!-- Login Container -->
    <main class="relative min-h-screen flex items-center justify-center overflow-hidden px-6 py-12">
        <!-- Background Imagery (Asymmetric & Mechanical) -->
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-gradient-to-r from-surface-dim via-surface-dim/80 to-transparent z-10">
            </div>
            <img class="absolute right-0 top-0 h-full w-full md:w-2/3 object-cover opacity-40 mix-blend-luminosity"
                data-alt="Close-up of a high-end motorcycle engine block with matte carbon fiber textures and precision-machined chrome bolts in low moody light"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuDessDwssjmsSYlVQvzanDdBbjFpGaLRQJKyvAzeyDdjV-5cOhe3zCVpfgs6eZjXrhZbx_2tOmEo4bhPceJ7083zuR6iggg6baPmrCGIQXmvYc7UJ-IpW61q-2HPAhACLpBWCDs9FusXhxp38DCOFDXr_Bz_VoSeAbGIqfufhmRHwK8e7h-Pj-BQEX4UZDR9AOJkZ3SUMevdW9XjJXgN8bhJLGYuLMV-M0fhmFxMuHlphn-15MVHx36d9eMChpHA_KGgPrqNh8zwIE" />
        </div>
        <!-- Semantic Shell: Login Form (Transactional Focus - TopNavBar & Footer suppressed per Rule) -->
        <section class="relative z-20 w-full max-w-md">
            <!-- Brand Anchor -->
            <div class="mb-12 flex flex-col items-center md:items-start">
                <h1 class="font-headline text-4xl font-extrabold tracking-tighter text-on-surface uppercase mb-2">
                    <a href="index.html" class="hover:text-secondary transition-colors">Odisha Bikes</a>
                </h1>
                <p class="text-on-surface-variant font-label text-sm tracking-[0.2em] uppercase opacity-70">
                    Kinetic Precision
                </p>
            </div>
            <!-- Form Card -->
            <div class="glass-panel p-8 md:p-10 rounded-xl shadow-2xl">
                <header class="mb-8">
                    <h2 class="font-headline text-2xl font-bold text-on-surface mb-1">Welcome Back</h2>
                    <p class="text-on-surface-variant text-sm">Access your mechanical gallery.</p>
                </header>
                <!-- Error message (shown by firebase.js) -->
                <div id="firebase-error" style="display:none;" class="mb-4 px-4 py-3 rounded-lg bg-red-900/40 border border-red-500/50 text-red-400 text-sm font-label"></div>
                <form id="login-form" class="space-y-6">
                    <!-- Email Field -->
                    <div class="group">
                        <label
                            class="block text-xs font-bold font-label uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-secondary transition-colors"
                            for="email">
                            Email Address
                        </label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary text-xl transition-colors">alternate_email</span>
                            <input
                                class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 pl-8 text-on-surface focus:ring-0 focus:border-secondary transition-all placeholder:text-zinc-700"
                                id="email" name="email" placeholder="rider@odishabikes.com" type="email" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="group">
                        <div class="flex justify-between items-center mb-2">
                            <label
                                class="block text-xs font-bold font-label uppercase tracking-widest text-on-surface-variant group-focus-within:text-secondary transition-colors"
                                for="password">
                                Password
                            </label>
                            <a class="text-[10px] font-bold font-label uppercase tracking-wider text-on-surface-variant hover:text-secondary transition-colors"
                                href="#">
                                Forgot Password?
                            </a>
                        </div>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary text-xl transition-colors">lock</span>
                            <input
                                class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 pl-8 text-on-surface focus:ring-0 focus:border-secondary transition-all placeholder:text-zinc-700"
                                id="password" name="password" placeholder="••••••••" type="password" />
                        </div>
                    </div>
                    <!-- CTA Button -->
                    <button
                        class="kinetic-gradient w-full py-4 rounded-full font-label font-bold text-on-secondary uppercase tracking-[0.1em] text-sm shadow-lg shadow-secondary-container/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 mt-8"
                        type="submit">
                        Login
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
                    </button>
                </form>
                <!-- Create Account Link -->
                <div class="mt-10 pt-8 border-t border-outline-variant/10 text-center">
                    <p class="text-on-surface-variant text-sm font-label">
                        Don't have an account?
                        <a class="text-on-surface font-bold hover:text-secondary transition-colors ml-1 inline-flex items-center group"
                            href="signup.html">
                            Create Account
                            <span
                                class="material-symbols-outlined text-xs ml-1 group-hover:translate-x-1 transition-transform">north_east</span>
                        </a>
                    </p>
                </div>
            </div>
            <!-- Footer Meta (Minimal Footer for focused page) -->
            <div class="mt-12 flex flex-col md:flex-row justify-between items-center gap-4 px-2 opacity-50">
                <span class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant">
                    © 2024 Odisha Bikes. Kinetic Precision.
                </span>
                <div class="flex gap-6">
                    <a class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant hover:text-secondary transition-colors"
                        href="#">Privacy</a>
                    <a class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant hover:text-secondary transition-colors"
                        href="#">Terms</a>
                </div>
            </div>
        </section>
    </main>
    <!-- Decorative Corner Element (Mechanical Detail) -->
    <div class="fixed bottom-0 right-0 p-12 hidden lg:block pointer-events-none opacity-20">
        <div class="relative w-32 h-32">
            <div class="absolute inset-0 border-[1px] border-outline-variant rounded-full animate-spin-slow"></div>
            <div class="absolute inset-4 border-[1px] border-secondary/40 rounded-full"></div>
            <div
                class="absolute inset-0 flex items-center justify-center font-headline text-on-surface text-xl font-black">
                OB</div>
        </div>
    </div>
    <!-- Single JS file for all pages -->
    <!-- Firebase SDK (compat version — works without npm/webpack) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/app.js"></script>
    <script src="js/firebase.js"></script>
</body>

</html>
